<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Room Scheduler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Tahoma, sans-serif;
      background: #d6d3ce;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 0;
    }

    /* ── App Window ── */
    #app {
      width: 1024px;
      height: 768px;
      background: #ebebeb;
      border: 1px solid #808080;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Menu Bar ── */
    #menubar {
      background: #ebebeb;
      border-bottom: 1px solid #aaa;
      display: flex;
      align-items: stretch;
      position: relative;
      user-select: none;
      flex-shrink: 0;
      height: 22px;
    }
    .menu-root { position: relative; }
    .menu-root-label {
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
      height: 100%;
      display: flex;
      align-items: center;
    }
    .menu-root-label:hover, .menu-root-label.open { background: #3875d7; color: white; }
    .dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #ebebeb;
      border: 1px solid #808080;
      min-width: 150px;
      z-index: 500;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .dropdown.show { display: block; }
    .dd-item {
      padding: 5px 16px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dd-item:hover { background: #3875d7; color: white; }
    .dd-item.has-sub::after { content: '▶'; font-size: 9px; margin-left: 10px; }
    .submenu-wrap { position: relative; }
    .submenu-wrap .dropdown { left: 100%; top: 0; }
    .submenu-wrap:hover .dropdown { display: block; }

    /* ── Main ── */
    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #ebebeb;
    }
    .panel {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      background: #ebebeb;
    }
    .panel.active { display: flex; flex-direction: column; }

    /* ── Panel Title ──
       Java: top gap 59px, title height 40px → title center at y=79, bottom at y=99 */
    .panel-title {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      padding-top: 59px;
      height: 99px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 0;
      flex-shrink: 0;
    }

    /* ── Form Body ──
       Java: left gap 233px, label 100px, gap 61px, input 241px
       Gap after title before first row: 59px (AddFaculty/AddRoom), 48px (ReserveRoom), 39px (AddDate) */
    .form-body {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding-left: 233px;
      flex: 1;
    }
    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 40px;
    }
    .form-label {
      font-size: 14px;
      text-align: right;
      width: 100px;
      margin-right: 61px;
      color: #000;
    }
    .form-ctrl {
      font-size: 14px;
      font-family: Tahoma, sans-serif;
      height: 35px;
      padding: 2px 6px;
      border: 1px solid #808080;
      width: 241px;
      background: white;
    }
    .form-ctrl:focus { outline: 1px solid #3875d7; }

    /* Buttons aligned at same x as inputs: 100px label + 61px gap = 161px offset */
    .form-btns { display: flex; gap: 18px; margin-left: 161px; }

    /* ── Buttons ── */
    .btn {
      font-family: Tahoma, sans-serif;
      font-size: 13px;
      font-weight: bold;
      height: 35px;
      padding: 0 12px;
      border: 1px solid #888;
      background: #e0e0e0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 113px;
      white-space: nowrap;
    }
    .btn:hover { background: #cac7c2; }
    .btn:active { background: #b8b5b0; }
    .btn-sm { min-width: 0; font-size: 13px; font-weight: normal; height: 35px; padding: 0 16px; }
    .btn-sm.wide { min-width: 170px; }

    /* ── Reservation List / Room List filter + table ── */
    .filter-bar {
      display: flex;
      align-items: center;
      padding: 6px 0 6px 36px;
      background: #ebebeb;
      border-bottom: 1px solid #bbb;
      flex-shrink: 0;
    }
    .filter-bar label { font-size: 14px; }
    .filter-bar select {
      font-family: Tahoma, sans-serif;
      font-size: 13px;
      height: 34px;
      padding: 2px 4px;
      border: 1px solid #808080;
      background: white;
    }
    .fl-spacer { flex: 1 1 57px; min-width: 57px; }

    .tbl-wrap { flex: 1; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: Tahoma, sans-serif; }
    thead tr { background: #dde3ee; }
    th { padding: 6px 8px; border: 1px solid #bbb; font-size: 13px; text-align: center; white-space: nowrap; }
    td { padding: 5px 8px; border-bottom: 1px solid #e8e8e8; }
    tr.selected td { background: #3875d7 !important; color: white; }
    tr:nth-child(even) td { background: #f0f4fc; }
    tr:hover:not(.selected) td { background: #dce8f8; cursor: pointer; }

    .list-footer {
      display: flex;
      justify-content: flex-end;
      gap: 48px;
      padding: 22px 38px;
      border-top: 1px solid #bbb;
      background: #ebebeb;
      flex-shrink: 0;
    }

    /* ── Status colors ── */
    .s-active  { color: #116611; font-weight: bold; }
    .s-waiting { color: #bb5500; font-weight: bold; }

    /* ── Dialog ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; justify-content: center; align-items: center; }
    .overlay.show { display: flex; }
    .dialog {
      background: #ebebeb;
      border: 1px solid #808080;
      min-width: 340px;
      max-width: 520px;
      padding: 20px 24px;
      font-family: Tahoma, sans-serif;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.3);
    }
    .dialog-title { font-weight: bold; font-size: 14px; margin-bottom: 14px; border-bottom: 1px solid #bbb; padding-bottom: 8px; }
    .dialog-msg { font-size: 13px; margin-bottom: 18px; white-space: pre-wrap; line-height: 1.5; }
    .dialog-footer { display: flex; justify-content: flex-end; gap: 10px; }
    .d-btn {
      font-family: Tahoma, sans-serif;
      font-size: 13px;
      height: 28px;
      padding: 0 20px;
      border: 1px solid #888;
      background: #e0e0e0;
      cursor: pointer;
    }
    .d-btn:hover { background: #cac7c2; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Menu Bar ── -->
  <div id="menubar">
    <div class="menu-root" id="menuRoot">
      <div class="menu-root-label" id="menuLabel" onclick="toggleMenu()">Menu</div>
      <div class="dropdown" id="menuDropdown">
        <div class="submenu-wrap">
          <div class="dd-item has-sub">New</div>
          <div class="dropdown">
            <div class="dd-item" onclick="nav('pnlAddFaculty')">Faculty</div>
            <div class="dd-item" onclick="nav('pnlAddRoom')">Room</div>
            <div class="dd-item" onclick="navReserve()">Reservation</div>
            <div class="dd-item" onclick="nav('pnlAddDate')">Date</div>
          </div>
        </div>
        <div class="submenu-wrap">
          <div class="dd-item has-sub">List</div>
          <div class="dropdown">
            <div class="dd-item" onclick="navReservationList()">Reservation List</div>
            <div class="dd-item" onclick="navRoomList()">Room List</div>
          </div>
        </div>
        <div class="dd-item" onclick="quitApp()">Quit</div>
      </div>
    </div>
  </div>

  <!-- ── Main ── -->
  <div id="main">

    <!-- Reservation List
         Java: BorderLayout — title PAGE_START, filter+table+footer CENTER -->
    <div class="panel" id="pnlReservationList">
      <div class="panel-title">Reservation List</div>

      <!-- Filter bar: 36px left gap | Faculty(65) 18 combo(120) 42 | Date(55) 18 combo(136) FLEX | Room(62) 18 combo(106) 40 | Status(62) 18 combo(106) 59 -->
      <div class="filter-bar">
        <label style="width:65px;text-align:right;margin-right:18px;">Faculty:</label>
        <select id="filterFaculty" style="width:120px;margin-right:42px;" onchange="renderReservations()"></select>
        <label style="width:55px;text-align:right;margin-right:18px;">Date:</label>
        <select id="filterDate" style="width:136px;" onchange="renderReservations()"></select>
        <div class="fl-spacer"></div>
        <label style="width:62px;text-align:right;margin-right:18px;">Room:</label>
        <select id="filterRoom" style="width:106px;margin-right:40px;" onchange="renderReservations()"></select>
        <label style="width:62px;text-align:right;margin-right:18px;">Status:</label>
        <select id="filterStatus" style="width:106px;margin-right:59px;" onchange="renderReservations()">
          <option value="">All</option>
          <option value="active">Active</option>
          <option value="waiting">Waiting</option>
        </select>
      </div>

      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Faculty</th>
              <th>Reserved Date</th>
              <th>Resquested Date</th>
              <th>Seats</th>
              <th>Room</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tblResBody"></tbody>
        </table>
      </div>

      <!-- Footer: right-aligned, btnAddReservation(170) gap(48) btnCancelReservation(170) gap(38) -->
      <div class="list-footer">
        <button class="btn btn-sm wide" onclick="navReserve()">&#10010; New Reservation</button>
        <button class="btn btn-sm wide" onclick="cancelSelectedRes()">&#128465; Cancel Reservation</button>
      </div>
    </div>

    <!-- Add Faculty
         Java: top gap 59 | title(40) | gap 59 | Faculty Name row(35) | gap 40 | buttons(35) -->
    <div class="panel" id="pnlAddFaculty">
      <div class="panel-title">Add Faculty</div>
      <div class="form-body" style="padding-top:59px;">
        <div class="form-row">
          <label class="form-label">Faculty Name:</label>
          <input class="form-ctrl" id="txtFacultyName" type="text" style="width:249px;" />
        </div>
        <!-- Add Faculty buttons: gap 161px within group (100+61 to align with input) -->
        <div class="form-btns">
          <button class="btn" style="min-width:98px;" onclick="addFaculty()">&#10010; Add</button>
          <button class="btn" style="min-width:auto;" onclick="navReservationList()">&#10006; Cancel</button>
        </div>
      </div>
    </div>

    <!-- Add Room
         Java: top gap 59 | title(40) | gap 59 | Room Name row(35) | gap 40 | Seats row(35) | gap 60 | buttons(35) -->
    <div class="panel" id="pnlAddRoom">
      <div class="panel-title">Add Room</div>
      <div class="form-body" style="padding-top:59px;">
        <div class="form-row">
          <label class="form-label">Room Name:</label>
          <input class="form-ctrl" id="txtRoomName" type="text" />
        </div>
        <div class="form-row" style="margin-bottom:60px;">
          <label class="form-label">Seats:</label>
          <input class="form-ctrl" id="txtRoomSeats" type="number" value="30" min="1" />
        </div>
        <div class="form-btns">
          <button class="btn" style="min-width:113px;" onclick="addRoom()">&#10010; Add</button>
          <button class="btn" style="min-width:113px;" onclick="navRoomList()">&#10006; Cancel</button>
        </div>
      </div>
    </div>

    <!-- Reserve Room
         Java: top gap 59 | title(40) | gap 48 | Faculty row(35) | gap 45 | Date row(35) | gap 45 | Seats row(35) | gap 62 | buttons(35)
         Left gap: 234px, input fills remaining (~254px wide) -->
    <div class="panel" id="pnlReserveRoom">
      <div class="panel-title">Reserve Room</div>
      <div class="form-body" style="padding-top:48px; padding-left:234px;">
        <div class="form-row" style="margin-bottom:45px;">
          <label class="form-label">Faculty:</label>
          <select class="form-ctrl" id="cbxFaculty" style="width:254px;"></select>
        </div>
        <div class="form-row" style="margin-bottom:45px;">
          <label class="form-label">Date:</label>
          <select class="form-ctrl" id="cbxDate" style="width:254px;"></select>
        </div>
        <div class="form-row" style="margin-bottom:62px;">
          <label class="form-label">Seats Number:</label>
          <input class="form-ctrl" id="txtSeats" type="number" value="30" min="1" style="width:254px;" />
        </div>
        <div class="form-btns">
          <button class="btn" style="min-width:auto;" onclick="makeReservation()">&#10010; Reserve</button>
          <button class="btn" style="min-width:115px;" onclick="navReservationList()">&#10006; Cancel</button>
        </div>
      </div>
    </div>

    <!-- Room List
         Java: BorderLayout — title PAGE_START, table CENTER, footer PAGE_END -->
    <div class="panel" id="pnlRoomList">
      <div class="panel-title">Room List</div>
      <div class="tbl-wrap" style="flex:1;">
        <table>
          <thead><tr><th>Name</th><th>Seats</th></tr></thead>
          <tbody id="tblRoomBody"></tbody>
        </table>
      </div>
      <!-- Footer: btnAddRoomInList(120) gap(35) btnDeleteRoom(default) gap(38) -->
      <div class="list-footer" style="gap:35px;">
        <button class="btn btn-sm" style="min-width:120px;" onclick="nav('pnlAddRoom')">&#10010; Add Room</button>
        <button class="btn btn-sm" style="min-width:auto;" onclick="deleteSelectedRoom()">&#128465; Delete Room</button>
      </div>
    </div>

    <!-- Add Date
         Java: top gap 59 | title(40) | gap 39 | Date row(35) | gap 52 | buttons(35)
         Left gap: 237px, label gap: 55px, btnAddDate(100) gap(38) btnCancelNewDate(default) -->
    <div class="panel" id="pnlAddDate">
      <div class="panel-title">Add Date</div>
      <div class="form-body" style="padding-top:39px; padding-left:237px;">
        <div class="form-row" style="margin-bottom:52px;">
          <label class="form-label" style="margin-right:55px;">Select Date:</label>
          <input class="form-ctrl" id="dateNewDate" type="date" style="width:auto;" />
        </div>
        <div class="form-btns" style="margin-left:155px;">
          <button class="btn" style="min-width:100px;" onclick="addDate()">&#10010; Add</button>
          <button class="btn" style="min-width:auto;" onclick="navReservationList()">&#10006; Cancel</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Dialog -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="dialog-title" id="dlgTitle"></div>
    <div class="dialog-msg"   id="dlgMsg"></div>
    <div class="dialog-footer" id="dlgFoot"></div>
  </div>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const DB = {
  get:    k   => JSON.parse(localStorage.getItem(k) || '[]'),
  set:    (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  nextId: k   => { const a = DB.get(k); return a.length ? Math.max(...a.map(x=>x.id))+1 : 1; }
};

// ── Dialog ───────────────────────────────────────────────────────────────────
function dlg(title, msg, buttons) {
  document.getElementById('dlgTitle').textContent = title;
  document.getElementById('dlgMsg').textContent   = msg;
  const foot = document.getElementById('dlgFoot');
  foot.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className   = 'd-btn';
    btn.textContent = b.label;
    btn.onclick = () => { closeDlg(); b.fn && b.fn(); };
    foot.appendChild(btn);
  });
  document.getElementById('overlay').classList.add('show');
}
const closeDlg = () => document.getElementById('overlay').classList.remove('show');
const info     = msg => dlg('Information', msg, [{label:'OK'}]);
const warn     = msg => dlg('Warning',     msg, [{label:'OK'}]);
const confirm2 = (msg, titleOrFn, fn) => {
  const title = (typeof titleOrFn === 'string') ? titleOrFn : 'Confirm';
  const cb    = (typeof titleOrFn === 'function') ? titleOrFn : fn;
  dlg(title, msg, [{label:'Yes', fn:cb}, {label:'No'}]);
};

// ── Menu ─────────────────────────────────────────────────────────────────────
function toggleMenu() {
  document.getElementById('menuDropdown').classList.toggle('show');
  document.getElementById('menuLabel').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#menuRoot')) {
    document.getElementById('menuDropdown').classList.remove('show');
    document.getElementById('menuLabel').classList.remove('open');
  }
});
function quitApp() {
  confirm2('Exit the Room Scheduler?', () => {
    document.getElementById('app').innerHTML =
      '<p style="padding:40px;font-family:Tahoma;font-size:16px;">Application closed. Refresh to restart.</p>';
  });
}

// ── Panel Nav ─────────────────────────────────────────────────────────────────
function nav(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('menuDropdown').classList.remove('show');
  document.getElementById('menuLabel').classList.remove('open');
}
function navReservationList() {
  populateFilterDropdowns();
  nav('pnlReservationList');
  renderReservations();
}
function navRoomList() { nav('pnlRoomList'); renderRoomTable(); }
function navReserve() {
  const faculty = DB.get('faculty');
  const dates   = DB.get('dates');
  if (!faculty.length) { warn('There are no faculty members added, please add a faculty first!!!'); return; }
  if (!dates.length)   { warn('There are no dates added, please add a date first!!!');             return; }
  document.getElementById('cbxFaculty').innerHTML =
    faculty.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
  document.getElementById('cbxDate').innerHTML =
    dates.map(d => `<option value="${d.id}">${d.date}</option>`).join('');
  document.getElementById('txtSeats').value = 30;
  nav('pnlReserveRoom');
}

// ── Faculty ───────────────────────────────────────────────────────────────────
function addFaculty() {
  const name = document.getElementById('txtFacultyName').value.trim();
  if (!name) { warn('Please fill all input fields!!!'); return; }
  const all = DB.get('faculty');
  if (all.find(f => f.name.toLowerCase() === name.toLowerCase())) {
    warn(`The name '${name}' already exists. Please choose another name!`); return;
  }
  all.push({ id: DB.nextId('faculty'), name });
  DB.set('faculty', all);
  document.getElementById('txtFacultyName').value = '';
  info(`Successfully inserted faculty '${name}'`);
  navReservationList();
}

// ── Rooms ─────────────────────────────────────────────────────────────────────
function addRoom() {
  const name  = document.getElementById('txtRoomName').value.trim();
  const seats = parseInt(document.getElementById('txtRoomSeats').value);
  if (!name || isNaN(seats) || seats < 1) { warn('Please fill all input fields!!!'); return; }
  const all = DB.get('rooms');
  if (all.find(r => r.name.toLowerCase() === name.toLowerCase() && r.status === 'active')) {
    warn(`The name '${name}' already exists. Please choose another name!`); return;
  }
  const id = DB.nextId('rooms');
  all.push({ id, name, seats, status: 'active' });
  DB.set('rooms', all);
  const promoted = promoteWaitlistForNewRoom(id, seats);
  document.getElementById('txtRoomName').value  = '';
  document.getElementById('txtRoomSeats').value = 30;
  if (promoted) {
    info(`Successfully inserted room '${name}'. The waiting list has updated!`);
  } else {
    info(`Successfully inserted room '${name}'`);
  }
  navRoomList();
}

function deleteSelectedRoom() {
  const row = document.querySelector('#tblRoomBody tr.selected');
  if (!row) { return; }
  const roomId = +row.dataset.id;
  const room   = DB.get('rooms').find(r => r.id === roomId);
  dropRoom(roomId, room.name);
  navRoomList();
}

function dropRoom(roomId, roomName) {
  const reservations = DB.get('reservations');
  const rooms        = DB.get('rooms');
  let lostMsg = '', gainMsg = '';
  reservations.filter(r => r.roomId === roomId && r.status === 'active').forEach(res => {
    res.roomId = null; res.status = 'waiting';
    const room2 = bestFit(res.dateId, res.seats, roomId);
    if (room2) {
      res.roomId = room2.id; res.status = 'active';
      gainMsg += `\n  ${DB.get('faculty').find(f=>f.id===res.facultyId).name}`;
    } else {
      lostMsg += `\n  ${DB.get('faculty').find(f=>f.id===res.facultyId).name}`;
    }
  });
  const room = rooms.find(r => r.id === roomId);
  if (room) room.status = 'delete';
  DB.set('rooms', rooms);
  DB.set('reservations', reservations);
  let msg = `Successfully deleted room '${roomName}'`;
  if (lostMsg) msg += '\n' + 'Some active reservations have been put on the waiting list:\n' + lostMsg;
  if (gainMsg) msg += '\n' + 'Some waiting reservations have been changed status to active:\n' + gainMsg;
  info(msg);
}

function renderRoomTable() {
  document.getElementById('tblRoomBody').innerHTML =
    DB.get('rooms').filter(r => r.status !== 'delete').map(r =>
      `<tr data-id="${r.id}" onclick="selectRow(this,'tblRoomBody')"><td>${r.name}</td><td>${r.seats}</td></tr>`
    ).join('');
}

// ── Dates ─────────────────────────────────────────────────────────────────────
function addDate() {
  const val = document.getElementById('dateNewDate').value;
  if (!val) { warn('Please select a day!!'); return; }
  const sel = new Date(val + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  if (sel < today) {
    warn('Invalid date. Date must be equal to or greater than the current date\nPlease select another day!!');
    return;
  }
  const all = DB.get('dates');
  if (all.find(d => d.date === val)) {
    warn(`The date '${val}' already exists. Please choose another date!`); return;
  }
  all.push({ id: DB.nextId('dates'), date: val });
  DB.set('dates', all);
  document.getElementById('dateNewDate').value = '';
  info(`Successfully inserted date '${val}'`);
}

// ── Business Logic ────────────────────────────────────────────────────────────
function bestFit(dateId, seats, excludeRoomId = null) {
  const reserved = new Set(
    DB.get('reservations').filter(r => r.dateId === dateId && r.status === 'active').map(r => r.roomId)
  );
  const rooms = DB.get('rooms')
    .filter(r => r.status !== 'delete' && r.seats >= seats && r.id !== excludeRoomId && !reserved.has(r.id));
  rooms.sort((a,b) => a.seats - b.seats);
  return rooms[0] || null;
}

function activateWaitlist(dateId) {
  const reservations = DB.get('reservations');
  const waiting = reservations
    .filter(r => r.dateId === dateId && r.status === 'waiting')
    .sort((a,b) => new Date(a.dateRequested) - new Date(b.dateRequested));
  const promoted = [];
  waiting.forEach(res => {
    const room = bestFit(dateId, res.seats);
    if (room) { res.roomId = room.id; res.status = 'active'; promoted.push(res); }
  });
  DB.set('reservations', reservations);
  return promoted;
}

function promoteWaitlistForNewRoom(roomId, seats) {
  const reservations = DB.get('reservations');
  const usedDates    = new Set();
  let promoted = false;
  reservations
    .filter(r => r.status === 'waiting' && r.seats <= seats)
    .sort((a,b) => new Date(a.dateRequested) - new Date(b.dateRequested))
    .forEach(res => {
      if (usedDates.has(res.dateId)) return;
      const taken = reservations.find(r => r.roomId === roomId && r.dateId === res.dateId && r.status === 'active');
      if (!taken) { res.roomId = roomId; res.status = 'active'; usedDates.add(res.dateId); promoted = true; }
    });
  DB.set('reservations', reservations);
  return promoted;
}

// ── Reservations ──────────────────────────────────────────────────────────────
function makeReservation() {
  const facultyId = +document.getElementById('cbxFaculty').value;
  const dateId    = +document.getElementById('cbxDate').value;
  const seats     = parseInt(document.getElementById('txtSeats').value);
  if (!facultyId || !dateId || isNaN(seats) || seats < 1) { warn('Please fill all input fields!!!'); return; }

  const existing = DB.get('reservations').find(r => r.facultyId === facultyId && r.dateId === dateId);
  if (existing) {
    const fac  = DB.get('faculty').find(f => f.id === facultyId);
    const date = DB.get('dates').find(d => d.id === dateId);
    confirm2(
      `Faculty '${fac.name}' made a reservation for date ${date.date}.\nYou can update it but the reservation may be placed in waiting list.\nDo you want to update it?`,
      'Confirm update',
      () => {
        const res = DB.get('reservations');
        res.splice(res.findIndex(r => r.id === existing.id), 1);
        DB.set('reservations', res);
        activateWaitlist(dateId);
        insertReservation(facultyId, dateId, seats, true);
        navReservationList();
      }
    );
  } else {
    insertReservation(facultyId, dateId, seats, false);
    navReservationList();
  }
}

function insertReservation(facultyId, dateId, seats, isUpdate) {
  const room  = bestFit(dateId, seats);
  const entry = {
    id: DB.nextId('reservations'),
    facultyId, dateId, seats,
    roomId: room ? room.id : null,
    status: room ? 'active' : 'waiting',
    dateRequested: new Date().toISOString()
  };
  const all = DB.get('reservations');
  all.push(entry);
  DB.set('reservations', all);
  const fac = DB.get('faculty').find(f => f.id === facultyId);
  const msg = isUpdate
    ? `Successfully updated reservation - ${fac.name}`
    : `Successfully reserved - ${fac.name}`;
  info(msg);
}

function cancelSelectedRes() {
  const row = document.querySelector('#tblResBody tr.selected');
  if (!row) { return; }
  const resId  = +row.dataset.id;
  const all    = DB.get('reservations');
  const idx    = all.findIndex(r => r.id === resId);
  const dateId = all[idx].dateId;
  const fac    = DB.get('faculty').find(f => f.id === all[idx].facultyId);
  all.splice(idx, 1);
  DB.set('reservations', all);
  activateWaitlist(dateId);
  info(`Successfully canceled reservation - ${fac.name}`);
  navReservationList();
}

// ── Filters & Render ──────────────────────────────────────────────────────────
function populateFilterDropdowns() {
  const faculty = DB.get('faculty');
  const dates   = DB.get('dates');
  const rooms   = DB.get('rooms').filter(r => r.status !== 'delete');
  const all     = '<option value="">All</option>';
  document.getElementById('filterFaculty').innerHTML = all + faculty.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
  document.getElementById('filterDate').innerHTML    = all + dates.map(d => `<option value="${d.id}">${d.date}</option>`).join('');
  document.getElementById('filterRoom').innerHTML    = all + rooms.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
}

function renderReservations() {
  const fId  = document.getElementById('filterFaculty').value;
  const dId  = document.getElementById('filterDate').value;
  const rId  = document.getElementById('filterRoom').value;
  const stat = document.getElementById('filterStatus').value;

  let list = DB.get('reservations');
  if (fId)  list = list.filter(r => r.facultyId == fId);
  if (dId)  list = list.filter(r => r.dateId    == dId);
  if (rId)  list = list.filter(r => r.roomId    == rId);
  if (stat) list = list.filter(r => r.status    === stat);

  const faculty = DB.get('faculty');
  const dates   = DB.get('dates');
  const rooms   = DB.get('rooms');

  list.sort((a,b) => {
    const da = dates.find(d => d.id === a.dateId)?.date || '';
    const db = dates.find(d => d.id === b.dateId)?.date || '';
    return da.localeCompare(db) || new Date(a.dateRequested) - new Date(b.dateRequested);
  });

  document.getElementById('tblResBody').innerHTML = list.map(r => {
    const f  = faculty.find(x => x.id === r.facultyId);
    const d  = dates.find(x => x.id === r.dateId);
    const rm = rooms.find(x => x.id === r.roomId);
    const sc = r.status === 'active' ? 's-active' : 's-waiting';
    const st = r.status.charAt(0).toUpperCase() + r.status.slice(1);
    const dr = new Date(r.dateRequested).toLocaleString();
    return `<tr data-id="${r.id}" onclick="selectRow(this,'tblResBody')">
      <td>${f?.name||''}</td>
      <td>${d?.date||''}</td>
      <td>${dr}</td>
      <td>${r.seats}</td>
      <td>${rm?.name||'—'}</td>
      <td class="${sc}">${st}</td>
    </tr>`;
  }).join('');
}

// ── Row Selection ─────────────────────────────────────────────────────────────
function selectRow(row, tbodyId) {
  document.querySelectorAll(`#${tbodyId} tr`).forEach(r => r.classList.remove('selected'));
  row.classList.add('selected');
}

// ── Init ──────────────────────────────────────────────────────────────────────
navReservationList();
</script>
